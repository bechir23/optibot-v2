global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "optibot-api"
    static_configs:
      - targets: ["optibot-api:8080"]
    metrics_path: /metrics

  - job_name: "livekit"
    static_configs:
      - targets: ["livekit:6789"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
